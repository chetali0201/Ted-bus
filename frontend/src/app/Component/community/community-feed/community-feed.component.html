<div class="w-full px-4 md:px-14 py-6">
  <div class="flex items-center justify-between">
    <div class="text-2xl font-bold text-gray-800">Community</div>
    <button
      class="bg-main-color text-white px-4 py-2 rounded-lg hover:opacity-90"
      (click)="goCreate()"
    >
      Create Post
    </button>
  </div>

  <div class="mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div
      *ngFor="let post of posts"
      class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 cursor-pointer hover:shadow-md transition"
      (click)="navigateToPost(post._id)"
    >
      <div class="flex items-start justify-between">
        <div class="text-sm text-gray-500">{{ post.type | titlecase }}</div>
        <div class="text-xs text-gray-400">{{ post.createdAt ? (post.createdAt | slice:0:10) : '' }}</div>
      </div>

      <div class="mt-2 font-semibold text-gray-900 line-clamp-2">{{ post.title }}</div>

      <div class="mt-2 text-gray-700 text-sm line-clamp-3">{{ post.content }}</div>

      <div class="mt-4 flex items-center gap-4 text-sm text-gray-600">
        <span class="flex items-center gap-1">👍 {{ post.likesCount }}</span>
        <span class="flex items-center gap-1">💬 {{ post.commentsCount }}</span>
      </div>
    </div>
  </div>

  <div *ngIf="posts.length === 0" class="mt-8 text-center text-gray-500">
    No posts yet.
  </div>
</div>
