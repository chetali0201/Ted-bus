<div class="w-full px-4 md:px-14 py-6" *ngIf="thread">
  <div class="text-2xl font-bold text-gray-800">{{ thread.title }}</div>
  <div class="mt-2 text-sm text-gray-500">Category: {{ thread.category }}</div>
  <div class="mt-3 bg-white border border-gray-100 rounded-xl shadow-sm p-6">{{ thread.content }}</div>

  <div class="mt-6 bg-white border border-gray-100 rounded-xl shadow-sm p-6">
    <div class="text-lg font-semibold text-gray-800">Replies</div>

    <div class="mt-4 flex gap-3">
      <input
        class="flex-1 border border-gray-200 rounded-lg px-3 py-2"
        [(ngModel)]="replyText"
        placeholder="Write a reply..."
      />
      <button class="bg-main-color text-white px-4 py-2 rounded-lg hover:opacity-90" (click)="postReply()">
        Reply
      </button>
    </div>

    <div *ngFor="let r of replies" class="mt-4 border-t border-gray-100 pt-4">
      <div class="text-sm text-gray-500">{{ r.userId }}</div>
      <div class="mt-1 text-gray-800">{{ r.text }}</div>
    </div>

    <div *ngIf="replies.length===0" class="mt-4 text-gray-500">No replies yet.</div>
  </div>
</div>

<div *ngIf="!thread" class="px-4 md:px-14 py-8 text-gray-500">Loading...</div>
