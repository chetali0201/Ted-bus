<div class="w-full px-4 md:px-14 py-6">
  <div class="text-2xl font-bold text-gray-800">Admin Moderation</div>

  <div class="mt-6 bg-white border border-gray-100 rounded-xl shadow-sm p-6">
    <div class="text-gray-600">Open reports: {{ reports.length }}</div>

    <div *ngFor="let rep of reports" class="mt-4 p-4 border border-gray-100 rounded-lg">
      <div class="flex items-start justify-between gap-3">
        <div>
          <div class="text-sm text-gray-500">Post ID: {{ rep.postId }}</div>
          <div class="mt-1 font-semibold text-gray-900">Reason: {{ rep.reason }}</div>
          <div class="mt-2 text-sm text-gray-500">Reporter: {{ rep.userId }}</div>
        </div>

        <div class="flex flex-col gap-2 min-w-[220px]">
          <button class="bg-main-color text-white px-3 py-2 rounded-lg hover:opacity-90" (click)="resolve(rep._id)">Resolve</button>
          <button class="border border-gray-200 text-gray-700 px-3 py-2 rounded-lg hover:bg-gray-50" (click)="dismiss(rep._id)">Dismiss</button>
          <button class="border border-red-200 text-red-600 px-3 py-2 rounded-lg hover:bg-red-50" (click)="deletePost(rep.postId)">Delete Post</button>
        </div>
      </div>
    </div>

    <div *ngIf="reports.length===0" class="mt-6 text-gray-500">No open reports.</div>
  </div>
</div>
