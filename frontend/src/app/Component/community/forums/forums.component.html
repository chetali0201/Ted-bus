<div class="w-full px-4 md:px-14 py-6">
  <div class="flex items-center justify-between">
    <div class="text-2xl font-bold text-gray-800">Discussion Forums</div>
  </div>

  <div class="mt-4 flex flex-wrap gap-3">
    <button class="px-4 py-2 rounded-lg border" [ngClass]="category==='Routes'?'border-main-color text-main-color bg-main-color/5':'border-gray-200 text-gray-700'" (click)="setCategory('Routes')">Routes</button>
    <button class="px-4 py-2 rounded-lg border" [ngClass]="category==='Destinations'?'border-main-color text-main-color bg-main-color/5':'border-gray-200 text-gray-700'" (click)="setCategory('Destinations')">Destinations</button>
    <button class="px-4 py-2 rounded-lg border" [ngClass]="category==='TravelAdvice'?'border-main-color text-main-color bg-main-color/5':'border-gray-200 text-gray-700'" (click)="setCategory('TravelAdvice')">Travel Advice</button>
  </div>

  <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
    <div
      *ngFor="let t of threads"
      class="bg-white border border-gray-100 rounded-xl shadow-sm p-4 cursor-pointer hover:shadow-md"
      (click)="navigateToThread(t._id)"
    >
      <div class="text-sm text-gray-500">{{ t.category }}</div>
      <div class="mt-1 font-semibold text-gray-900">{{ t.title }}</div>
      <div class="mt-2 text-sm text-gray-700 line-clamp-3">{{ t.content }}</div>
    </div>
  </div>

  <div *ngIf="threads.length===0" class="mt-6 text-gray-500">No threads in this category.</div>
</div>
